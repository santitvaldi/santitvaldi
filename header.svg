<svg width="600" height="160" viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .phrase { opacity: 0; }
      .p0 { animation: cycle 25s 0s     infinite; }
      .p1 { animation: cycle 25s -20s   infinite; }
      .p2 { animation: cycle 25s -15s   infinite; }
      .p3 { animation: cycle 25s -10s   infinite; }
      .p4 { animation: cycle 25s -5s    infinite; }
      @keyframes cycle {
        0%   { opacity:0 }
        3%   { opacity:1 }
        17%  { opacity:1 }
        20%  { opacity:0 }
        100% { opacity:0 }
      }
    </style>
  </defs>

  <!-- < Santiago Valdi > -->
  <text x="300" y="44" text-anchor="middle"
        font-family="ui-monospace,'Cascadia Code','SF Mono',monospace"
        font-size="26" font-weight="300" letter-spacing="1">
    <tspan fill="#6096E0">&lt; </tspan><tspan fill="#f0f2f5">Santiago Valdi</tspan><tspan fill="#6096E0"> &gt;</tspan>
  </text>

  <!-- title line 1 -->
  <text x="300" y="72" text-anchor="middle"
        font-family="ui-monospace,'Cascadia Code','SF Mono',monospace"
        font-size="13" font-weight="300" fill="#6096E0" letter-spacing="0.3">
    Técnico en Programación Informática
  </text>

  <!-- title line 2 -->
  <text x="300" y="90" text-anchor="middle"
        font-family="ui-monospace,'Cascadia Code','SF Mono',monospace"
        font-size="12" font-weight="300" fill="#4a5a78" letter-spacing="0.3">
    Universidad Nacional de San Martín
  </text>

  <!-- phrase 0 -->
  <text x="300" y="130" text-anchor="middle"
        font-family="ui-monospace,'Cascadia Code','SF Mono',monospace"
        font-size="12" font-weight="300" letter-spacing="0.2">
    <tspan class="phrase p0" fill="#3a4a68">clean <tspan fill="#6096E0">code</tspan>, clean <tspan fill="#6096E0">mind</tspan></tspan>
  </text>

  <!-- phrase 1 -->
  <text x="300" y="130" text-anchor="middle"
        font-family="ui-monospace,'Cascadia Code','SF Mono',monospace"
        font-size="12" font-weight="300" letter-spacing="0.2">
    <tspan class="phrase p1" fill="#3a4a68"><tspan fill="#6096E0">best practices</tspan> are not optional</tspan>
  </text>

  <!-- phrase 2 -->
  <text x="300" y="130" text-anchor="middle"
        font-family="ui-monospace,'Cascadia Code','SF Mono',monospace"
        font-size="12" font-weight="300" letter-spacing="0.2">
    <tspan class="phrase p2" fill="#3a4a68">there's <tspan fill="#6096E0">always</tspan> a more <tspan fill="#6096E0">elegant</tspan> solution</tspan>
  </text>

  <!-- phrase 3 -->
  <text x="300" y="130" text-anchor="middle"
        font-family="ui-monospace,'Cascadia Code','SF Mono',monospace"
        font-size="12" font-weight="300" letter-spacing="0.2">
    <tspan class="phrase p3" fill="#3a4a68"><tspan fill="#6096E0">always</tspan> thinking <tspan fill="#6096E0">ahead</tspan></tspan>
  </text>

  <!-- phrase 4 -->
  <text x="300" y="130" text-anchor="middle"
        font-family="ui-monospace,'Cascadia Code','SF Mono',monospace"
        font-size="12" font-weight="300" letter-spacing="0.2">
    <tspan class="phrase p4" fill="#3a4a68"><tspan fill="#6096E0">detail</tspan> is what separates good from <tspan fill="#6096E0">great</tspan></tspan>
  </text>

</svg>